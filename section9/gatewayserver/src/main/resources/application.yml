spring:
  application:
    name: "gatewayserver"
  config:
    import: "optional:configserver:http://localhost:8071"

  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lowercase-service-id: true
management:
  endpoints:
    web:
      exposure:
        include: "*"
  info:
    env:
      enabled: true
  endpoint:
    gateway:
      access: unrestricted

info:
  app:
    name: "gatewayserver"
    description: "Gateway Server Application"
    version: "1.0.0"